<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APROSS Venezuela</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        h1 {
            color: #0056b3;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1em;
            color: #666;
        }
        .badge {
            background-color: #28a745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Sitio Oficial</div>
        <h1>APROSS Venezuela</h1>
        <p>Estamos reconstruyendo nuestra plataforma para ofrecerte una mejor experiencia técnica y de soporte. Próximamente disponible.</p>
    </div>
</body>
</html>
